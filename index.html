<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#07110f"><title>Job Application Tracker V1.3</title><link rel="stylesheet" href="styles/main.css"></head><body><div class="aurora a"></div><div class="aurora b"></div><main class="shell"><header><div><div class="brand"><span class="brandDot"></span>CAREER COMMAND CENTER <span class="version">V1.3</span></div><h1>Job Application <em>Tracker</em></h1><p>Keep every opportunity, follow-up and outcome under control.</p></div><button id="add" class="primary">＋ Add Application</button></header><section id="metrics" class="metrics"></section><section class="glass toolbar"><input id="search" placeholder="⌕  Search company, position, location or notes"><select id="filter"><option value="">All statuses</option><option>Applied</option><option>Under Review</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>Withdrawn</option></select><select id="sort"><option value="new">Newest</option><option value="old">Oldest</option><option value="company">Company A–Z</option><option value="priority">Priority</option></select><button id="archive">View Archive</button><button id="export">Export JSON</button><button id="import">Import JSON</button><input id="file" type="file" accept=".json,application/json" hidden></section><section class="glass analytics"><div class="sectionTitle"><div><span>APPLICATION INTELLIGENCE</span><h2>Analytics</h2></div><small>Active pipeline distribution</small></div><div id="chart"></div></section><div class="sectionTitle listHead"><div><span>OPPORTUNITY PIPELINE</span><h2 id="listTitle">Active Applications</h2></div><small id="count"></small></div><section id="list" class="grid"></section></main><dialog id="dlg"><form id="form"><div class="modalHead"><div><span>APPLICATION RECORD</span><h2 id="modalTitle">Add Application</h2></div><button type="button" id="cancel" class="icon">✕</button></div><input id="id" type="hidden"><div class="formGrid"><label>Company *<input id="company" required></label><label>Position *<input id="position" required></label><label>Salary<input id="salary" placeholder="RM2,500"></label><label>Location<input id="location"></label><label>Platform<input id="platform" placeholder="JobStreet / MyFutureJobs"></label><label>Status<select id="status"><option>Applied</option><option>Under Review</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>Withdrawn</option></select></label><label>Priority<select id="priority"><option>High</option><option selected>Medium</option><option>Low</option></select></label><label>Date Applied<input id="dateApplied" type="date"></label><label>Job Link<input id="jobLink" type="url"></label><label>Resume Version<input id="resume"></label><label class="wide">Notes<textarea id="notes" rows="4"></textarea></label></div><div class="modalActions"><button type="button" id="close">Cancel</button><button class="primary">Save Application</button></div></form></dialog><div id="toast"></div><script src="scripts/app.js"></script></body></html>
