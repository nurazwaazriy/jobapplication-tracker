<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Job Tracker V1.2</title><link rel="stylesheet" href="styles/main.css"></head><body><main><header><h1>Job Application Tracker</h1><button id="add">+ Add Application</button></header><section id="metrics"></section><section class="tools"><input id="search" placeholder="Search"><select id="filter"><option value="">All statuses</option><option>Applied</option><option>Under Review</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>Withdrawn</option></select><select id="sort"><option value="new">Newest</option><option value="old">Oldest</option><option value="company">Company A-Z</option></select><button id="archive">View Archive</button><button id="export">Export JSON</button><button id="import">Import JSON</button><input id="file" type="file" accept=".json" hidden></section><section class="panel"><h2>Analytics</h2><div id="chart"></div></section><section id="list"></section></main><dialog id="dlg"><form id="form"><input id="id" type="hidden"><input id="company" placeholder="Company*" required><input id="position" placeholder="Position*" required><input id="salary" placeholder="Salary"><input id="location" placeholder="Location"><input id="platform" placeholder="Platform"><select id="status"><option>Applied</option><option>Under Review</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>Withdrawn</option></select><select id="priority"><option>High</option><option selected>Medium</option><option>Low</option></select><input id="dateApplied" type="date"><input id="jobLink" type="url" placeholder="Job Link"><input id="resume" placeholder="Resume Version"><textarea id="notes" placeholder="Notes"></textarea><div><button type="button" id="cancel">Cancel</button><button>Save</button></div></form></dialog><script src="scripts/app.js"></script></body></html>
